<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <rect width="512" height="512" rx="124" ry="124" fill="#3db8ff" />
  <g transform="translate(136, 136) scale(1.5)" stroke="black" stroke-width="12" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- filmstrip outline -->
    <rect x="0" y="0" width="160" height="160" rx="18" ry="18" stroke="black" stroke-width="16" />
    <!-- vertical lines inside -->
    <line x1="35" y1="0" x2="35" y2="160" stroke="black" stroke-width="12" />
    <line x1="125" y1="0" x2="125" y2="160" stroke="black" stroke-width="12" />
    <!-- horizontal division in center -->
    <line x1="35" y1="80" x2="125" y2="80" stroke="black" stroke-width="12" />
    <!-- film holes on left side -->
    <rect x="8" y="15" width="18" height="18" rx="4" fill="black" stroke="none" />
    <rect x="8" y="50" width="18" height="18" rx="4" fill="black" stroke="none" />
    <rect x="8" y="90" width="18" height="18" rx="4" fill="black" stroke="none" />
    <rect x="8" y="125" width="18" height="18" rx="4" fill="black" stroke="none" />
    <!-- film holes on right side -->
    <rect x="134" y="15" width="18" height="18" rx="4" fill="black" stroke="none" />
    <rect x="134" y="50" width="18" height="18" rx="4" fill="black" stroke="none" />
    <rect x="134" y="90" width="18" height="18" rx="4" fill="black" stroke="none" />
    <rect x="134" y="125" width="18" height="18" rx="4" fill="black" stroke="none" />
  </g>
</svg>
